    <script>
        // 마우스 추적 스크립트 - 마우스에 밀착되도록 조정
        const cursor = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        // 페이지별 고유 진행률 설정 (예: 소개 0, 프로젝트 25, 어그로 50, 좋아하는 것 75)
        const BASE_PROGRESS = 50; 
        
        // 페이지 로드 시 즉시 설정
        window.onload = function() {
            document.getElementById("progressBar").style.width = BASE_PROGRESS + "%";
        };

        // 스크롤 시 추가 계산
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 25; 
            document.getElementById("progressBar").style.width = (BASE_PROGRESS + scrolled) + "%";
        };
    </script>
</body>
